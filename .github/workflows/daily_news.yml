name: Daily News Intelligence (Legacy Mode)

on:
  schedule:
    - cron: '0 */3 * * *' # 3시간마다 실행
  workflow_dispatch: # 수동 실행 버튼

permissions:
  contents: write # 변경된 기사 파일을 푸시하기 위해 필요

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f automation/requirements.txt ]; then pip install -r automation/requirements.txt; fi

      - name: Run News Pipeline (Legacy Mode)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # 3시간마다 기사 10건을 생성하는 핵심 명령어
          python automation/news_main.py --mode legacy --limit 10

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "chore: automated news update $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git pull --rebase origin main
          git push
