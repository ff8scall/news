name: Lego-Sia Daily Tech Intelligence

on:
  schedule:
    # 2시간마다 자동 실행 (무료 API 보호를 위해 15초 지연 엔진 탑재됨)
    - cron: '0 */2 * * *'
  workflow_dispatch: # 수동 실행을 위한 버튼

permissions:
  contents: write

jobs:
  harvest-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run News Intelligence Engine
        env:
          # [핵심 지능]
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          
          # [뉴스 소스 보급로]
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          NEWSAPI_ORG_KEY: ${{ secrets.NEWSAPI_ORG_KEY }}
          THENEWSAPI_KEY: ${{ secrets.THENEWSAPI_KEY }}
          CURRENTSAPI_KEY: ${{ secrets.CURRENTSAPI_KEY }}
          
          # [리포트 채널]
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python automation/news_main.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Lego-Sia AI Bot"
          git config --global user.email "bot@lego-sia.com"
          git add .
          git commit -m "auto: periodic tech intelligence update [skip ci]" || echo "No changes to commit"
          git push origin main
