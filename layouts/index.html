{{ define "main" }}
<div class="home-page">

  {{/* ── 최신 글 카드 그리드 ── */}}
  <section class="posts-section" style="padding-top: 40px; padding-bottom: 100px;">
    <div class="container">
      <h2 class="section-title" style="margin-bottom: 40px; font-size: 1.5rem; font-weight: 700; color: var(--text-primary);">
        {{ .Site.Params.latestPostTitle }}
      </h2>

      <div class="card-grid">
        {{ range first 12 (where .Site.RegularPages "Section" "posts") }}
        {{ partial "card.html" . }}
        {{ end }}
      </div>

      {{/* ── 페이지네이션 ── */}}
      <div style="margin-top: 60px;">
        {{ template "_internal/pagination.html" . }}
      </div>
    </div>
  </section>

</div>
{{ end }}
