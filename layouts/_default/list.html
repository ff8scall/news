{{ define "main" }}
<div class="section-page">
  <div class="container">

    <header class="section-header">
      <h1 class="section-title">{{ .Title }}</h1>
      {{ with .Params.description }}<p class="section-desc" style="opacity: 0.7; margin-bottom: 24px;">{{ . }}</p>{{ end }}
      
      <p class="section-count" style="margin-bottom: 24px; font-size: 0.9rem; color: var(--p-text-muted);">총 {{ .Paginator.TotalNumberOfElements }}개의 뉴스 인텔리전스</p>
    </header>

    <div class="card-grid">
      {{ range .Paginator.Pages }}
        {{ partial "card.html" . }}
      {{ end }}
    </div>

    {{ template "_internal/pagination.html" . }}

  </div>
</div>
{{ end }}
