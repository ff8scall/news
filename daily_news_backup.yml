name: Daily Premium News Intelligence

on:
  schedule:
    - cron: '0 */3 * * *' # 3시간마다 실행
  workflow_dispatch: # 수동 실행 버튼 추가

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f automation/requirements.txt ]; then pip install -r automation/requirements.txt; fi

      - name: Run Premium News Pipeline
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          # nlm CLI가 설치되어 있어야 함 (필요시 설치 단계 추가)
          python automation/nlm_orchestrator.py --mode B --full --limit 10

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "chore: automated premium news update $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git push
