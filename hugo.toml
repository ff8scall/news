baseURL = "https://blog.lego-sia.com/"
languageCode = "ko"
defaultContentLanguage = "ko"
title = "blog.lego-sia.com"
enableRobotsTXT = true
enableGitInfo = true
removePathAccents = false

[pagination]
  pagerSize = 10

[params]
  siteName = "blog.lego-sia.com"
  siteDescription = "캠핑, 라이프스타일, 테크 트렌드를 빠르고 정확하게 전달하는 프리미엄 정보 블로그"
  author = "Lego-sia"
  logo = "/images/logo.svg"
  twitterHandle = ""
  ogImage = "/images/og-default.jpg"
  googleAdSense = ""
  googleAnalytics = ""

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokai"
    lineNos = true
    lineNumbersInTable = true

[taxonomies]
  category = "categories"
  tag = "tags"

[outputs]
  home    = ["HTML", "RSS", "JSON"]
  page    = ["HTML"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML"]
  term    = ["HTML", "RSS"]

[[menus.main]]
  name   = "캠핑"
  url    = "/camping/"
  weight = 1

[[menus.main]]
  name   = "IT·테크"
  url    = "/it/"
  weight = 2

[[menus.main]]
  name   = "라이프스타일"
  url    = "/lifestyle/"
  weight = 3

[[menus.main]]
  name   = "요리"
  url    = "/cooking/"
  weight = 4
