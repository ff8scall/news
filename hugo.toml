baseURL = "https://blog.lego-sia.com/"
languageCode = "ko"
defaultContentLanguage = "ko"
title = "blog.lego-sia.com"
enableRobotsTXT = true
enableGitInfo = true
removePathAccents = false

[pagination]
  pagerSize = 10

[params]
  siteName = "blog.lego-sia.com"
  siteDescription = "인공지능(AI), 신기술, 스마트 수익화 전략을 다루는 프리미엄 테크 매거진"
  author = "Lego-Sia"
  logo = "/images/logo.svg"
  twitterHandle = ""
  ogImage = "/images/og-default.jpg"
  googleAdSense = ""
  googleAnalytics = ""
  # -- Search Engine Verification --
  googleSiteVerification = ""
  naverSiteVerification = ""
  bingSiteVerification = ""
  indexNowKey = "bd9cab15af0446658b1e7bd00b8120ca"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "monokai"
    lineNos = true
    lineNumbersInTable = true

[taxonomies]
  category = "categories"
  tag = "tags"

[outputs]
  home    = ["HTML", "RSS", "JSON"]
  page    = ["HTML"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML"]
  term    = ["HTML", "RSS"]

[[menus.main]]
  name   = "AI·신기술"
  url    = "/categories/ai-신기술/"
  weight = 1

[[menus.main]]
  name   = "AI 에이전트"
  url    = "/categories/ai-에이전트/"
  weight = 2

[[menus.main]]
  name   = "수익화 전략"
  url    = "/categories/수익화-전략/"
  weight = 3

[[menus.main]]
  name   = "라이프·취미"
