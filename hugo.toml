baseURL = 'https://news.lego-sia.com'
title = '레고-시아 AI 테크 인텔리전스'
defaultContentLanguage = 'ko'
hasCJKLanguage = true
buildFuture = true

[pagination]
  pagerSize = 18

[taxonomies]
  category = 'categories'
  tag = 'tags'
  cluster = 'clusters'

[languages]
  [languages.ko]
    languageName = "한국어"
    contentDir = "content/ko"
    weight = 1
    [languages.ko.menu]
      [[languages.ko.menu.main]]
        name = "AI"
        identifier = "ai"
        url = "/clusters/ai/"
        weight = 1
      [[languages.ko.menu.main]]
        name = "하드웨어"
        identifier = "hardware"
        url = "/clusters/hardware/"
        weight = 2
      [[languages.ko.menu.main]]
        name = "인사이트"
        identifier = "insights"
        url = "/clusters/insights/"
        weight = 3

  [languages.en]
    languageName = "English"
    contentDir = "content/en"
    weight = 2
    [languages.en.menu]
      [[languages.en.menu.main]]
        name = "AI"
        identifier = "ai"
        url = "/en/clusters/ai/"
        weight = 1
      [[languages.en.menu.main]]
        name = "Hardware"
        identifier = "hardware"
        url = "/en/clusters/hardware/"
        weight = 2
      [[languages.en.menu.main]]
        name = "Insights"
        identifier = "insights"
        url = "/en/clusters/insights/"
        weight = 3

[params]
  ui_version = "V0"
  [params.ui]
    badge_colors = { "AI" = "#3B82F6", "하드웨어" = "#10B981", "인사이트" = "#F59E0B" }
    tag_prefix = true
