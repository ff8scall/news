baseURL = 'https://news.lego-sia.com'
title = '레고-시아 AI 테크 인텔리전스'
defaultContentLanguage = 'ko'
hasCJKLanguage = true
buildFuture = true

[pagination]
  pagerSize = 18

[taxonomies]
  tag = 'tags'
  cluster = 'clusters'

[languages]
  [languages.ko]
    languageName = "한국어"
    contentDir = "content/ko"
    weight = 1
    [languages.ko.menu]
      [[languages.ko.menu.main]]
        name = "AI"
        identifier = "ai"
        url = "/clusters/ai/"
        weight = 1
      [[languages.ko.menu.main]]
        name = "Hardware"
        identifier = "hardware"
        url = "/clusters/hardware/"
        weight = 2
      [[languages.ko.menu.main]]
        name = "Insights"
        identifier = "insights"
        url = "/clusters/insights/"
        weight = 3
      [[languages.ko.menu.main]]
        name = "Markets"
        identifier = "markets"
        url = "/clusters/markets/"
        weight = 4

  [languages.en]
    languageName = "English"
    contentDir = "content/en"
    weight = 2
    [languages.en.menu]
      [[languages.en.menu.main]]
        name = "AI"
        identifier = "ai"
        url = "/en/clusters/ai/"
        weight = 1
      [[languages.en.menu.main]]
        name = "Hardware"
        identifier = "hardware"
        url = "/en/clusters/hardware/"
        weight = 2
      [[languages.en.menu.main]]
        name = "Insights"
        identifier = "insights"
        url = "/en/clusters/insights/"
        weight = 3
      [[languages.en.menu.main]]
        name = "Markets"
        identifier = "markets"
        url = "/en/clusters/markets/"
        weight = 4

[params]
  ui_version = "V0"
  bingSiteVerification = "048AB450B6B91E03CAF13FDE8415F954" # Bing SEO Verification Tag (Last updated: 2026-04-21 14:16)
  [params.ui]
    # Cluster UI Mapping (Centralized management)
    badge_colors = { "ai" = "#3B82F6", "hardware" = "#10B981", "insights" = "#F59E0B", "markets" = "#EC4899" }
    cluster_names = { "ai" = "AI", "hardware" = "Hardware", "insights" = "Insights", "markets" = "Markets" }
    tag_prefix = true
