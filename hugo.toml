baseURL = 'https://news.lego-sia.com'
title = '레고-시아 AI 테크 인텔리전스'
defaultContentLanguage = 'ko'
hasCJKLanguage = true

[taxonomies]
  category = 'categories'
  tag = 'tags'
  cluster = 'clusters'

[languages]
  [languages.ko]
    languageName = "한국어"
    contentDir = "content/ko"
    weight = 1
    [languages.ko.menu]
      [[languages.ko.menu.main]]
        name = "AI"
        identifier = "ai"
        url = "/clusters/ai-models-tools/"
        weight = 1
      [[languages.ko.menu.main]]
        name = "하드웨어"
        identifier = "hardware"
        url = "/clusters/gpu-hardware/"
        weight = 2
      [[languages.ko.menu.main]]
        name = "게임 테크"
        identifier = "gaming"
        url = "/clusters/ai-gaming/"
        weight = 3
      [[languages.ko.menu.main]]
        name = "가이드"
        identifier = "guides"
        url = "/clusters/guides/"
        weight = 4

  [languages.en]
    languageName = "English"
    contentDir = "content/en"
    weight = 2
    [languages.en.menu]
      [[languages.en.menu.main]]
        name = "AI"
        url = "/en/clusters/ai-models-tools/"
        weight = 1
      [[languages.en.menu.main]]
        name = "Hardware"
        url = "/en/clusters/gpu-hardware/"
        weight = 2
      [[languages.en.menu.main]]
        name = "Gaming"
        url = "/en/clusters/ai-gaming/"
        weight = 3
      [[languages.en.menu.main]]
        name = "Guides"
        url = "/en/clusters/guides/"
        weight = 4

[params]
  ui_version = "V0"
  [params.ui]
    badge_colors = { "AI" = "#3B82F6", "하드웨어" = "#10B981", "게임 테크" = "#8B5CF6", "가이드" = "#F59E0B" }
    tag_prefix = true
